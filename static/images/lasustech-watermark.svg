    <path d="M 335 420 L 397 420" class="page-line" />
    <path d="M 335 454 L 397 454" class="page-line" />
    <path d="M 335 488 L 397 488" class="page-line" />
    <path d="M 503 420 L 565 420" class="page-line" />
    <path d="M 503 454 L 565 454" class="page-line" />
    <path d="M 503 488 L 565 488" class="page-line" />
    <path d="M 330 548 C 380 500, 520 500, 570 548" fill="none" stroke="#5f88b8" stroke-width="14" stroke-linecap="round" />
    <path d="M 360 568 C 395 548, 505 548, 540 568" fill="none" stroke="#173458" stroke-width="18" stroke-linecap="round" />
    <path d="M 392 620 C 420 606, 480 606, 508 620" fill="none" stroke="#c9d7eb" stroke-width="8" stroke-linecap="round" opacity="0.9" />
