{% extends 'base.html' %}
{% block content %}
<div class="hero-panel" style="margin-bottom: 1rem;">
	<span class="hero-badge">Security</span>
	<h1 class="page-title">Change Password</h1>
	<p class="muted">Choose a new password to keep your university account secure.</p>
</div>

<div class="form-card" style="max-width: 640px;">
	<form method="post" class="stack">{% csrf_token %}{{ form.as_p }}<button type="submit">Update Password</button></form>
</div>
{% endblock %}
